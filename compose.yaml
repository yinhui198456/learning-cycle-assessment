x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: team_learn_plan
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d team_learn_plan"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  web:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://user:password@db:5432/team_learn_plan
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - emails:/app/emails
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  staticfiles:
  media:
  emails:
  backups:
