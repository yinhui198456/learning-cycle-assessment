{% extends "base.html" %}

{% block content %}
<h1>登录</h1>
{% if form.errors %}
<p>用户名或密码错误。</p>
{% endif %}
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    {{ form.as_p }}
    <button type="submit">登录</button>
</form>
{% endblock %}
