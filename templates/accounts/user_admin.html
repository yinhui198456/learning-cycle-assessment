{% extends "base.html" %}

{% block content %}
<h1>账号与角色管理</h1>

<table>
    <thead>
        <tr>
            <th>用户名</th>
            <th>邮箱</th>
            <th>状态</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email|default:"-" }}</td>
            <td>{% if user.is_active %}启用{% else %}停用{% endif %}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
